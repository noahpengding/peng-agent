services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - 6333:6333
      - 6334:6334
    networks:
      - agent
    volumes:
      - /data/peng-agent/qdrant:/qdrant/storage
    security_opt:
      - no-new-privileges=true

  peng-agent-mysql:
    image: mysql:lts
    container_name: peng-agent-mysql
    hostname: peng-agent
    restart: always
    ports:
      - "3306:3306"
    networks:
      - agent
    env_file:
      - ./.env
    volumes:
      - /data/peng-agent/mysql:/var/lib/mysql
    security_opt:
      - no-new-privileges=true

  peng-agent-redis:
    image: redis:latest
    container_name: peng-agent-redis
    hostname: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - agent
    security_opt:
      - no-new-privileges=true


  peng-agent-server:
    build:
      context: ../server
      dockerfile: ../server/Dockerfile
    container_name: peng-agent-server
    hostname: peng-chat
    restart: always
    ports:
      - "1532:1532"
    networks:
      - agent
    env_file:
      - ./.env
    depends_on:
      - peng-agent-mysql

  peng-agent-front:
    build:
      context: ../app
      dockerfile: ../app/Dockerfile
    container_name: peng-agent-front
    restart: always
    env_file:
      - ./front.env
    ports:
      - "8080:80"
    networks:
      - agent
    depends_on:
      - peng-agent-server


networks:
  agent:
    driver: bridge

