name: Build and Deploy

on:
    [push, pull_request]

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository }}/server
  WEB_IMAGE: ghcr.io/${{ github.repository }}/front
  VERSION: v2.4.4
  GITHUB_REPOSITORY: ${{ github.repository }}
  GITHUB_COMMIT_SHA: ${{ github.sha }}

jobs:
  # Backend CI (Lint and Test) - runs on all branches
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential libpq-dev

      - name: Install Python dependencies
        run: uv sync
        working-directory: ./server

      - name: Install ruff
        run: uv tool install ruff

      - name: Run ruff check
        run: uv tool run ruff check
        working-directory: ./server

      - name: Configure Datadog Test Optimization
        uses: datadog/test-visibility-github-action@v2
        with:
          languages: python
          api_key: ${{secrets.DD_API_KEY}}
          site: us5.datadoghq.com

      - name: Run unit tests with coverage
        run: uv run python -m unittest discover -s test
        working-directory: ./server

      - name: Generate coverage report
        run: |
          uv run --with coverage coverage run -m unittest discover test
          uv run --with coverage coverage xml -o coverage.xml
        working-directory: ./server

      - name: Upload coverage report to Datadog
        uses: DataDog/coverage-upload-github-action@v1
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          site: us5.datadoghq.com
          files: ./server/coverage.xml

  # Web frontend lint check
  web-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ./app/web

      - name: Run ESLint
        run: bun run lint
        working-directory: ./app/web

  mobile-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ./app/mobile

      - name: Run ESLint
        run: bun run lint
        working-directory: ./app/mobile

  # CodeQL security analysis - runs on all branches and outputs to Security tab
  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'javascript']
        include:
          - language: python
            path: './server'
          - language: javascript
            path: './app/web'
          - language: javascript
            path: './app/mobile'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config: |
            paths:
              - ${{ matrix.path }}
            paths-ignore:
              - '**/node_modules'
              - '**/dist'
              - '**/build'
              - '**/*.min.js'

      - name: Setup Python for Python analysis
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv for Python dependencies
        if: matrix.language == 'python'
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies with uv
        if: matrix.language == 'python'
        run: |
          uv python install 3.12
          uv sync
        working-directory: ${{ matrix.path }}

      - name: Setup Bun for JavaScript analysis
        if: matrix.language == 'javascript'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JavaScript dependencies with Bun
        if: matrix.language == 'javascript'
        run: bun install
        working-directory: ${{ matrix.path }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
  

  # Test builds for non-main branches (PRs)
  test-server-x64:
    if: github.ref != 'refs/heads/main'
    needs: [backend-ci, codeql-analysis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server test image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.SERVER_IMAGE }}:${{ env.VERSION }}-nightly
          build-args: |
            DD_GIT_REPOSITORY_URL=${{ env.GITHUB_REPOSITORY }}
            DD_GIT_COMMIT_SHA=${{ env.GITHUB_COMMIT_SHA }}

  test-web-x64:
    if: github.ref != 'refs/heads/main'
    needs: [web-lint, codeql-analysis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web test image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.WEB_IMAGE }}:${{ env.VERSION }}-nightly
          build-args: |
            DD_GIT_REPOSITORY_URL=${{ env.GITHUB_REPOSITORY }}
            DD_GIT_COMMIT_SHA=${{ env.GITHUB_COMMIT_SHA }}
            VERSION=${{ env.VERSION }}-nightly

  mobile-preview:
    if: github.ref != 'refs/heads/main'
    needs: [mobile-lint, codeql-analysis, test-server-x64, test-web-x64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: |
          cd app/mobile && bun install

      - name: Build Mobile App (Preview)
        run: cd app/mobile && eas build --platform android --profile preview --local --output=./${{ env.VERSION }}-android-preview.apk --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VERSION }}-android-preview.apk
          path: app/mobile/${{ env.VERSION }}-android-preview.apk

  # Production builds for main branch
  server:
    if: github.ref == 'refs/heads/main'
    needs: [backend-ci, codeql-analysis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server x64 image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64, linux/arm64
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ env.VERSION }}
            ${{ env.SERVER_IMAGE }}:latest
          build-args: |
            DD_GIT_REPOSITORY_URL=${{ env.GITHUB_REPOSITORY }}
            DD_GIT_COMMIT_SHA=${{ env.GITHUB_COMMIT_SHA }}

  web:
    if: github.ref == 'refs/heads/main'
    needs: [web-lint, codeql-analysis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web x64 image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64, linux/arm64
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.VERSION }}
            ${{ env.WEB_IMAGE }}:latest
          build-args: |
            DD_GIT_REPOSITORY_URL=${{ env.GITHUB_REPOSITORY }}
            DD_GIT_COMMIT_SHA=${{ env.GITHUB_COMMIT_SHA }}
            VERSION=${{ env.VERSION }}

  mobile-production:
    if: github.ref == 'refs/heads/main'
    needs: [mobile-lint, codeql-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: |
          cd app/mobile && bun install

      - name: Build Mobile App (Production)
        run: cd app/mobile && eas build --platform android --profile production --local --output=./${{ env.VERSION }}-android.apk --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VERSION }}-android.apk
          path: app/mobile/${{ env.VERSION }}-android.apk

  publish-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [server, web, mobile-production]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download mobile build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.VERSION }}-android.apk
          path: ./artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: ./artifacts/${{ env.VERSION }}-android.apk
